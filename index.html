<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Graduação Docente</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#111;
        color:#0f0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:#1b1b1b;
        padding:30px;
        border-radius:12px;
        width:400px;
        box-shadow:0 0 20px rgba(0,255,0,0.3);
    }

    h1{
        text-align:center;
        font-size:22px;
        margin-bottom:25px;
    }

    label{
        display:block;
        margin-top:15px;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:5px;
        border:none;
        border-radius:6px;
        font-size:16px;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:12px;
        border:none;
        border-radius:6px;
        background:#0f0;
        color:#000;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        background:#00cc00;
    }

    .resultado{
        margin-top:25px;
        padding:15px;
        background:#222;
        border-radius:8px;
        line-height:1.8;
    }

    .footer{
        margin-top:20px;
        text-align:center;
        font-size:12px;
        color:#888;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Calculadora de Graduação Docente</h1>

    <label>Tempo de serviço ANTERIOR (dias)</label>
    <input type="number" id="anterior">

    <label>Tempo de serviço POSTERIOR (dias)</label>
    <input type="number" id="posterior">

    <label>Classificação do docente</label>
    <input type="number" step="0.001" id="classificacao">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado" style="display:none;">
        <div id="tempo"></div>
        <div id="graduacao"></div>
    </div>

    <div class="footer">
        Desenvolvido por Mario Menezes
    </div>
</div>

<script>
function calcular() {

    let anterior = parseFloat(document.getElementById("anterior").value) || 0;
    let posterior = parseFloat(document.getElementById("posterior").value) || 0;
    let classificacao = parseFloat(document.getElementById("classificacao").value) || 0;

    // cálculo igual ao BAT
    let total = (anterior * 0.5) + posterior;
    let graduacao = classificacao + (total / 365);

    document.getElementById("resultado").style.display = "block";

    document.getElementById("tempo").innerHTML =
        "<strong>Tempo ponderado:</strong> " + total.toFixed(2) + " dias";

    document.getElementById("graduacao").innerHTML =
        "<strong>Graduação final:</strong> " + graduacao.toFixed(3);
}
</script>

</body>
</html>
